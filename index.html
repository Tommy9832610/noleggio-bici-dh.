        a { text-decoration: none; color: #fff; }

            top: 0;
            z-index: 1000;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
        }
        nav ul li {
            display: inline;
            margin: 0 15px;
        }
        nav ul li a {
            font-weight: bold;
            transition: color 0.3s;
        }
        nav ul li a:hover { color: #f1c40f; }

        /* Sezione Eroica (Hero) */
        .hero {

        }
        .btn {
            display: inline-block;
            background: #e67e22;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover { background: #d35400; }

        .flotta {
            padding: 3rem 1rem;
            text-align: center;
        }
        .bici-container {

            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: left;
        }
        .card-bici h3 { margin-top: 10px; margin-bottom: 5px; text-align: center; }
        .card-bici img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }
        .prezzo { font-size: 1.2rem; color: #27ae60; font-weight: bold; margin-top: 10px; text-align: center; }

            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
